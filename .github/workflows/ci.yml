name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # uv tool/package cache only (keys derived from uv lockfiles); Go uses setup-go above.
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: make install-deps

    - name: Format check
      run: |
        make fmt
        git diff --exit-code -- '*.go' || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

    - name: Run linter
      run: make lint

    - name: Run vet
      run: make vet

    - name: Run all tests (unit and integration) with coverage
      run: |
        make clean build test-all-coverage

    - name: Upload coverage reports to Codecov
      continue-on-error: ${{ github.actor == 'dependabot[bot]' }}  # Don't fail CI on Dependabot PRs since they can't access secrets
      uses: codecov/codecov-action@e53489f4d376d79066609109e7a95a29eb3740b1 # v7.0.0
      with:
        files: ./bin/coverage.out,./bin/coverage-fvt.out,./bin/coverage-init.out
        disable_search: true
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build and verify the API documentation
      run: |
        npm ci
        make documentation
        git diff --exit-code || (echo "API documentation is not generated. Run 'make documentation' locally." && exit 1)

  security-scan:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Run Gosec Security Scanner
      uses: securego/gosec@5a2f0a6455f43d8ac8efaf1591ee0fb400dce662 # v2.27.1
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload SARIF file to GitHub Security tab
      uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
      if: always()
      with:
        sarif_file: gosec-results.sarif
        category: "gosec-security-scan"

    - name: Upload Gosec results as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: gosec-results
        path: gosec-results.sarif

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: Containerfile
        push: false
        load: true
        tags: evalhub:pr-check

    - name: Dry-run Docker image
      run: docker run --rm evalhub:pr-check /app/eval-hub --local --help

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'push'

    env:
      IMAGE_REGISTRY: quay.io
      IMAGE_REPOSITORY: evalhub/evalhub

    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to Quay.io
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      with:
        images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        # Branch push: <branch>-<sha>, <branch>, latest
        # Tag push (v1.2.3): 1.2.3, 1.2, latest
        tags: |
          type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=${{ github.ref_name }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=latest
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      id: build
      with:
        context: .
        file: Containerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          ${{ steps.meta.outputs.labels }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'quay.expires-after=12w' || '' }}
        annotations: |
          ${{ steps.meta.outputs.annotations }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'manifest:quay.expires-after=12w' || '' }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'index:quay.expires-after=12w' || '' }}

    - name: Dry-run Docker image
      run: |
        IMAGE_REF=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
        docker pull "${IMAGE_REF}"
        docker run --rm "${IMAGE_REF}" /app/eval-hub --local --help
