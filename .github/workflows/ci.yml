name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        # uv tool/package cache only (keys derived from uv lockfiles); Go uses setup-go above.
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: make install-deps

    - name: Format check
      run: |
        make fmt
        git diff --exit-code -- '*.go' || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

    - name: Run linter
      run: make lint

    - name: Run vet
      run: make vet

    - name: Run all tests (unit and integration) with coverage
      run: |
        make clean build test-all-coverage

    - name: Upload coverage reports to Codecov
      continue-on-error: ${{ github.actor == 'dependabot[bot]' }}  # Don't fail CI on Dependabot PRs since they can't access secrets
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./bin/coverage.out,./bin/coverage-fvt.out,./bin/coverage-init.out
        disable_search: true
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build and verify the API documentation
      run: |
        npm ci
        make documentation
        git diff --exit-code || (echo "API documentation is not generated. Run 'make documentation' locally." && exit 1)

  security-scan:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Run Gosec Security Scanner
      # The recommended way to run the gosec scanner is to use -no-fail
      # https://github.com/securego/gosec#integrating-with-code-scanning
      # The problem is that this can hide some errors (such as golang version mismatch)
      # that are not caught by the following steps.
      env:
        # make sure that we use the golang version required by the project
        GOSECGOVERSION: go1.26.4
        GOTOOLCHAIN: go1.26.4
      uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
      with:
        args: '-fmt sarif -out gosec-results.sarif -stdout -verbose=text -exclude-dir=tests ./...'

    - name: Upload SARIF file to GitHub Security tab
      uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
      if: always()
      with:
        sarif_file: gosec-results.sarif
        category: "gosec-security-scan"

    - name: Upload Gosec results as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: gosec-results
        path: gosec-results.sarif

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'pull_request'

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: Containerfile
        push: false
        load: true
        tags: evalhub:pr-check

    - name: Dry-run Docker image
      run: docker run --rm evalhub:pr-check /app/eval-hub --local --help

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: github.event_name == 'push'

    env:
      IMAGE_REGISTRY: quay.io
      IMAGE_REPOSITORY: evalhub/evalhub

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to Quay.io
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      with:
        images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
        # Branch push: <branch>-<sha>, <branch>, latest
        # Tag push (v1.2.3): 1.2.3, 1.2, latest
        tags: |
          type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=${{ github.ref_name }},enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=latest
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      id: build
      with:
        context: .
        file: Containerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          ${{ steps.meta.outputs.labels }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'quay.expires-after=12w' || '' }}
        annotations: |
          ${{ steps.meta.outputs.annotations }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'manifest:quay.expires-after=12w' || '' }}
          ${{ !startsWith(github.ref, 'refs/tags/') && 'index:quay.expires-after=12w' || '' }}

    - name: Dry-run Docker image
      run: |
        IMAGE_REF=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
        docker pull "${IMAGE_REF}"
        docker run --rm "${IMAGE_REF}" /app/eval-hub --local --help
