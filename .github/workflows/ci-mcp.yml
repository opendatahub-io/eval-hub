name: CI MCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cmd/evalhub_mcp/**'
      - 'internal/evalhub_mcp/**'
      - 'pkg/evalhubclient/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/ci-mcp.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cmd/evalhub_mcp/**'
      - 'internal/evalhub_mcp/**'
      - 'pkg/evalhubclient/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/ci-mcp.yml'

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Format check
      run: |
        gofmt -l ./cmd/evalhub_mcp/ ./internal/evalhub_mcp/ ./pkg/evalhubclient/
        if [ -n "$(gofmt -l ./cmd/evalhub_mcp/ ./internal/evalhub_mcp/ ./pkg/evalhubclient/)" ]; then
          echo "Code is not formatted. Run 'gofmt -w' locally."
          exit 1
        fi

    - name: Run vet
      run: go vet ./cmd/evalhub_mcp/... ./internal/evalhub_mcp/... ./pkg/evalhubclient/...

    - name: Run unit tests
      run: go test -v -race ./cmd/evalhub_mcp/... ./internal/evalhub_mcp/... ./pkg/evalhubclient/...

  build-platforms:
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Build all platforms
      run: make build-all-platforms-mcp

    - name: Upload binaries
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: evalhub-mcp-binaries
        path: bin/evalhub-mcp-*
