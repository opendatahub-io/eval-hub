name: CI MCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cmd/evalhub_mcp/**'
      - 'internal/evalhub_mcp/**'
      - 'pkg/evalhubclient/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/ci-mcp.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cmd/evalhub_mcp/**'
      - 'internal/evalhub_mcp/**'
      - 'pkg/evalhubclient/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/ci-mcp.yml'

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Format check
      run: |
        gofmt -l ./cmd/evalhub_mcp/ ./internal/evalhub_mcp/ ./pkg/evalhubclient/
        if [ -n "$(gofmt -l ./cmd/evalhub_mcp/ ./internal/evalhub_mcp/ ./pkg/evalhubclient/)" ]; then
          echo "Code is not formatted. Run 'gofmt -w' locally."
          exit 1
        fi

    - name: Run vet
      run: go vet ./cmd/evalhub_mcp/... ./internal/evalhub_mcp/... ./pkg/evalhubclient/...

    - name: Run unit tests
      run: go test -v -race ./cmd/evalhub_mcp/... ./internal/evalhub_mcp/... ./pkg/evalhubclient/...

  build-platforms:
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
    - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Build all platforms
      run: make build-all-platforms-mcp

    - name: Upload binaries
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: evalhub-mcp-binaries
        path: bin/evalhub-mcp-*
