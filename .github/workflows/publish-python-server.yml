name: Build and Publish eval-hub-server

on:
  push:
    branches:
      - main
    tags: ['*']  # we haven't established a Tag strategy yet
  workflow_dispatch:
    inputs:
      publish-test-pypi:
        description: 'Publish to TestPyPI'
        type: boolean
        default: true
      validate-wheels:
        description: 'Run wheel validation on real runners before publishing'
        type: boolean
        default: true

jobs:
  build-binaries:
    name: Build Go binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            output: bin/eval-hub-linux-amd64
          - goos: linux
            goarch: arm64
            output: bin/eval-hub-linux-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            output: bin/eval-hub-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: bin/eval-hub-darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            output: bin/eval-hub-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build binary
        run: make cross-compile CROSS_GOOS=${{ matrix.goos }} CROSS_GOARCH=${{ matrix.goarch }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.output }}
          retention-days: 7

  build-wheels:
    name: Build Python wheels
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: manylinux
            arch: x86_64
            goos: linux
            goarch: amd64
          - platform: manylinux
            arch: aarch64
            goos: linux
            goarch: arm64
          - platform: macosx
            arch: x86_64
            goos: darwin
            goarch: amd64
          - platform: macosx
            arch: arm64
            goos: darwin
            goarch: arm64
          - platform: win
            arch: amd64
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"

      - name: Install wheel and setuptools
        run: make install-wheel-tools

      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          merge-multiple: true

      - name: List downloaded files
        run: ls -la bin/

      - name: Build wheel
        env:
          GH_REF: ${{ github.ref }}
          GH_RUN_NUMBER: ${{ github.run_number }}
        run: |
          DEV_SUFFIX_ARG=""
          if [[ ! "${GH_REF}" == refs/tags/* ]]; then
            DEV_SUFFIX_ARG="DEV_SUFFIX=dev${GH_RUN_NUMBER}"
          fi
          make build-wheel CROSS_GOOS=${{ matrix.goos }} CROSS_GOARCH=${{ matrix.goarch }} $DEV_SUFFIX_ARG

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.platform }}-${{ matrix.arch }}
          path: python-server/dist/*.whl
          retention-days: 7

  validate-wheels:
    name: Validate wheel (${{ matrix.os }})
    needs: build-wheels
    if: github.event_name != 'workflow_dispatch' || inputs.validate-wheels != false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wheel-artifact: wheel-manylinux-x86_64
          - os: ubuntu-24.04-arm
            wheel-artifact: wheel-manylinux-aarch64
          # Commenting out x86_64 macos as it is hard to come by a runner in GHA
          # - os: macos-13
          #   wheel-artifact: wheel-macosx-x86_64
          - os: macos-latest
            wheel-artifact: wheel-macosx-arm64
          - os: windows-latest
            wheel-artifact: wheel-win-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up uv python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"

      - name: Download wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.wheel-artifact }}
          path: dist/

      - name: Create venv and install wheel
        shell: bash
        run: |
          uv venv .venv
          uv pip install --python .venv dist/*.whl

      - name: Wheel sanity test
        shell: bash
        run: |
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          else
            source .venv/Scripts/activate
          fi
          chmod +x scripts/gha_wheel_sanity_test.sh
          ./scripts/gha_wheel_sanity_test.sh

  publish:
    name: Publish to PyPI
    needs: [build-wheels, validate-wheels]
    # Publish clean versions to PyPI only on actual tag pushes.
    # The event_name check prevents workflow_dispatch targeting a tag ref from triggering this.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/eval-hub-server
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  check-testpypi-age:
    name: Check TestPyPI release age
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Check last TestPyPI upload age
        id: check
        run: |
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

          RESPONSE=$(curl -sf "https://test.pypi.org/pypi/eval-hub-server/json") || exit 0

          LATEST_UPLOAD=$(echo "$RESPONSE" | jq -r '
            [.releases[][] | .upload_time_iso_8601] | max // empty
          ')
          [ -z "$LATEST_UPLOAD" ] && exit 0

          UPLOAD_EPOCH=$(date -d "$LATEST_UPLOAD" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - UPLOAD_EPOCH) / 86400 ))
          echo "Latest TestPyPI upload: $LATEST_UPLOAD ($AGE_DAYS days ago)"

          if [ "$AGE_DAYS" -lt 7 ]; then
            echo "Last release is only $AGE_DAYS days old — skipping TestPyPI publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-test-pypi:
    name: Publish to TestPyPI
    needs: [build-wheels, validate-wheels, check-testpypi-age]
    # TestPyPI only receives devX versions. Tag refs are excluded so that
    # workflow_dispatch against a tag cannot publish a clean release version here.
    # Manual dispatch always publishes; automatic main pushes only publish if
    # the last TestPyPI release is older than 7 days.
    if: >-
      !failure() && !cancelled()
      && (
        (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/') && inputs.publish-test-pypi)
        || (github.ref == 'refs/heads/main' && needs.check-testpypi-age.outputs.should_publish == 'true')
      )
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/eval-hub-server
    permissions:
      id-token: write

    steps:
      - name: Download manylinux x86_64 wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheel-manylinux-x86_64
          path: dist/

      - name: Download macOS arm64 wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheel-macosx-arm64
          path: dist/

      - name: List wheels
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false
          verbose: true
