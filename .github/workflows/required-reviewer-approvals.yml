name: Required reviewer approvals

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - review_requested
      - review_request_removed
      - labeled
      - unlabeled
    branches: [main, develop]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: required-reviewer-approvals-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  required-reviewer-approvals:
    name: Verify requested reviewer approvals
    if: |
      github.event.pull_request.draft == false &&
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify all requested reviewers have approved
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          REQUIRED_LABEL: ready-for-review
        run: bash .github/scripts/verify-requested-reviewer-approvals.sh
