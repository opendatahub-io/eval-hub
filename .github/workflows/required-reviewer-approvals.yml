name: Required reviewer approvals

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - review_requested
      - review_request_removed
      - labeled
      - unlabeled
    branches: [main, develop]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: required-reviewer-approvals-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  required-reviewer-approvals:
    name: Verify requested reviewer approvals
    if: |
      github.event.pull_request.draft == false &&
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify all requested reviewers have approved
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          REQUIRED_LABEL: ready-for-review
        run: bash .github/scripts/verify-requested-reviewer-approvals.sh
