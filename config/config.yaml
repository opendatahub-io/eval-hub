service:
  port: 8080
  host: "127.0.0.1"
  termination_file: "/tmp/termination-log"
  # read_timeout: 15s       # http.Server ReadTimeout; omit or 0 for default (15s)
  # write_timeout: 15s      # http.Server WriteTimeout; omit or 0 for default (15s)
  # idle_timeout: 60s       # http.Server IdleTimeout; omit or 0 for default (60s)
  # read_header_timeout: 15s   # HTTP server ReadHeaderTimeout; omit or 0 for default (15s)
  # max_header_bytes: 1048576    # http.Server MaxHeaderBytes; omit or 0 for default (1 MiB, net/http default)
  # max_request_body_bytes: 10485760  # default 10 MiB when omitted or 0; use -1 to disable the limit
# These are here so that the config can be loaded from the secrets directory when needed
secrets:
  dir: /tmp
  mappings:
    # db_password: database.password
# These are here so that the config can be loaded from the environment variables when needed
env_mappings:
  PORT: service.port
  API_HOST: service.host
  TLS_CERT_FILE: service.tls_cert_file
  TLS_KEY_FILE: service.tls_key_file
  DB_URL: database.url
  MLFLOW_TRACKING_URI: mlflow.tracking_uri
  MLFLOW_CA_CERT_PATH: mlflow.ca_cert_path
  MLFLOW_INSECURE_SKIP_VERIFY: mlflow.insecure_skip_verify
  MLFLOW_TOKEN_PATH: mlflow.token_path
  MLFLOW_WORKSPACE: mlflow.workspace
  EVALHUB_CA_CERT_PATH: sidecar.eval_hub.ca_cert_path
  EVALHUB_INSECURE_SKIP_VERIFY: sidecar.eval_hub.insecure_skip_verify
  EVALHUB_TOKEN_CACHE_TIMEOUT: sidecar.eval_hub.token_cache_timeout
  MLFLOW_TOKEN_CACHE_TIMEOUT: sidecar.mlflow.token_cache_timeout
  SIDECAR_PORT: sidecar.port
  METRICS_PORT: prometheus.port
  METRICS_HOST: prometheus.host
  OTEL_METRIC_EXPORT_INTERVAL: otel.metric_export_interval

# Database configuration
database:
  driver: sqlite
  url: file::eval_hub:?mode=memory&cache=shared
  # driver: pgx
  # url: postgres://user@localhost:5432/eval_hub

# MLFlow configuration - enable by setting the tracking_uri
mlflow:
  # tracking_uri: http://localhost:5000
  # token_path: /var/run/secrets/kubernetes.io/serviceaccount/token

# This is an example of how to enable instrumentation in a cluster
otel:
  enabled: false
  exporter_type: "otlp-grpc"
  exporter_endpoint: "localhost:4317"
  exporter_insecure: false
  sampling_ratio: 1.0
  enable_tracing: true
  enable_metrics: true  # required for otelhttp HTTP metrics and OTEL-bridged /metrics scrape
  enable_logs: true
  enable_job_container_logs: true  # requires enable_logs; exports adapter container logs at job completion
prometheus:
  enabled: true
  port: 8081
  host: "0.0.0.0"

sidecar:
  base_url: http://localhost:8080  # URL for adapter/runtime to call sidecar proxy (cluster mode)
  port: 8080
  eval_hub:
    # TLS for outbound calls to eval-hub (sidecar -> eval-hub API).
    # On cluster: job pods inject EVALHUB_CA_CERT_PATH and EVALHUB_INSECURE_SKIP_VERIFY; sidecar reads
    # sidecar_config.json (no evalhub-config ConfigMap on the job pod).
    # ca_cert_path: path to PEM CA bundle that signed the eval-hub server cert (e.g. /etc/pki/ca-trust/source/anchors/service-ca.crt).
    # insecure_skip_verify: set to true only for dev with self-signed certs; set false to verify server cert.
    ca_cert_path: "/etc/pki/ca-trust/source/anchors/service-ca.crt"
    insecure_skip_verify: false
    # token_cache_timeout: TTL for in-memory auth token cache (e.g. "5m", "1h"). Empty/0 uses default (5m).
    # token_cache_timeout: 5m
  mlflow:
    # token_cache_timeout: TTL for in-memory auth token cache for MLflow proxy (e.g. "5m", "1h"). Empty/0 uses default (5m).
    # token_cache_timeout: 5m
  # OCI registry proxy
  # oci:
  #   ca_cert_path: /etc/pki/ca-trust/source/anchors/registry-ca.crt  # optional
  #   insecure_skip_verify: false
  sidecar_container:
    image: quay.io/rh-ee-nbs/nbs-dev:eval-hub_v27
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
