openapi: 3.1.0
info:
  title: Eval Hub
  description: API REST server for evaluation backend orchestration
  version: 0.4.5
  contact:
    name: API Support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost:8080
    description: Local development server
security: []
tags:
  - name: Evaluations
    description: Evaluation job management endpoints
  - name: Collections
    description: Benchmark collection management endpoints
  - name: Providers
    description: Evaluation provider endpoints
  - name: Health
    description: Health check endpoints
  - name: Metrics
    description: Metrics and monitoring endpoints
    x-internal: true
  - name: Documentation
    description: API documentation endpoints
    x-internal: true
paths:
  /api/v1/health:
    get:
      summary: Health Check
      description: Health check endpoint.
      operationId: get_health
      tags:
        - Health
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: Healthy service response
                  value:
                    status: healthy
                    version: N.N.N
                    timestamp: '2026-05-27T18:42:11Z'
                    git_hash: abc1234
                    uptime: 86400000000000
                degraded:
                  summary: Degraded service response
                  value:
                    status: degraded
                    version: N.N.N
                    timestamp: '2026-05-27T18:42:11Z'
                    git_hash: abc1234
                    uptime: 172800000000000
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /metrics:
    get:
      x-internal: true
      summary: Metrics
      description: Prometheus metrics endpoint with MLflow health check.
      operationId: get_metrics
      tags:
        - Metrics
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /openapi.yaml:
    get:
      x-internal: true
      summary: OpenAPI specification
      description: Returns the OpenAPI 3.1.0 specification for this API
      operationId: get_openapi
      tags:
        - Documentation
      responses:
        '200':
          description: OpenAPI specification
          content:
            application/yaml:
              schema:
                type: string
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /docs:
    get:
      x-internal: true
      summary: API documentation
      description: Interactive API documentation (Swagger UI)
      operationId: get_docs
      tags:
        - Documentation
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/evaluations/jobs:
    post:
      tags:
        - Evaluations
      summary: Create Evaluation
      description: Create and execute evaluation request using the simplified benchmark schema.
      operationId: post_evaluations_jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationJobConfig'
            examples:
              CreateEvaluationWithBenchmarks:
                summary: Evaluate a model with inline benchmarks
                value:
                  name: granite-3.1-8b-safety-eval
                  description: Safety and reasoning evaluation for Granite 3.1 8B Instruct
                  tags:
                    - nightly
                    - granite
                  model:
                    url: http://llm-service.models.svc.cluster.local:8000/v1
                    name: granite-3.1-8b-instruct
                  benchmarks:
                    - id: arc_easy
                      provider_id: lm_evaluation_harness
                      weight: 0.6
                      primary_score:
                        metric: acc_norm
                        lower_is_better: false
                      pass_criteria:
                        threshold: 0.25
                      parameters:
                        num_fewshot: 0
                        limit: 100
                    - id: owasp_llm_top10
                      provider_id: garak
                      weight: 0.4
                      primary_score:
                        metric: attack_success_rate
                        lower_is_better: true
                      pass_criteria:
                        threshold: 0.3
                  pass_criteria:
                    threshold: 0.5
              CreateEvaluationWithCollection:
                summary: Evaluate a model using a benchmark collection
                value:
                  name: llama-3.2-standard-eval
                  description: Standard evaluation suite for Llama 3.2 3B
                  tags:
                    - release-candidate
                  model:
                    url: http://llm-service.models.svc.cluster.local:8000/v1
                    name: llama-3.2-3b
                  collection:
                    id: standard-safety-collection
                  pass_criteria:
                    threshold: 0.5
              CreateEvaluationWithAuthAndQueue:
                summary: Evaluate an authenticated model with Kueue scheduling
                value:
                  name: granite-3.1-8b-gpu-eval
                  description: GPU-scheduled evaluation with model authentication
                  tags:
                    - gpu
                    - kueue
                  model:
                    url: http://llm-service.models.svc.cluster.local:8000/v1
                    name: granite-3.1-8b-instruct
                    auth:
                      secret_ref: llm-api-key
                  benchmarks:
                    - id: arc_easy
                      provider_id: lm_evaluation_harness
                      parameters:
                        num_fewshot: 0
                        limit: 100
                  pass_criteria:
                    threshold: 0.5
                  queue:
                    kind: kueue
                    name: gpu-local-queue
              CreateEvaluationWithExperiment:
                summary: Evaluate with MLFlow experiment tracking
                value:
                  name: llama-3.2-nightly-eval
                  description: Nightly evaluation tracked in MLFlow
                  tags:
                    - nightly
                    - mlflow
                  model:
                    url: http://llm-service.models.svc.cluster.local:8000/v1
                    name: llama-3.2-3b
                  benchmarks:
                    - id: arc_easy
                      provider_id: lm_evaluation_harness
                      weight: 0.6
                      primary_score:
                        metric: acc_norm
                        lower_is_better: false
                      parameters:
                        num_fewshot: 0
                    - id: owasp_llm_top10
                      provider_id: garak
                      weight: 0.4
                      primary_score:
                        metric: attack_success_rate
                        lower_is_better: true
                  pass_criteria:
                    threshold: 0.5
                  experiment:
                    name: nightly-eval-experiment
                    tags:
                      - key: team
                        value: model-evaluation
                      - key: pipeline
                        value: nightly
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationJobResource'
              examples:
                response:
                  summary: Evaluation job accepted and queued
                  value:
                    resource:
                      id: a1b2c3d4-5678-9abc-def0-1234567890ab
                      tenant: default
                      created_at: '2026-01-15T09:30:00Z'
                      updated_at: '2026-01-15T09:30:00Z'
                      owner: user@example.com
                    status:
                      state: pending
                      message:
                        message: Evaluation job created.
                        message_code: evaluation_job_created
                    name: granite-3.1-8b-safety-eval
                    description: Safety and reasoning evaluation for Granite 3.1 8B Instruct
                    tags:
                      - nightly
                      - granite
                    model:
                      url: http://llm-service.models.svc.cluster.local:8000/v1
                      name: granite-3.1-8b-instruct
                    benchmarks:
                      - id: arc_easy
                        provider_id: lm_evaluation_harness
                        weight: 0.6
                        primary_score:
                          metric: acc_norm
                          lower_is_better: false
                        pass_criteria:
                          threshold: 0.25
                        parameters:
                          num_fewshot: 0
                          limit: 100
                      - id: owasp_llm_top10
                        provider_id: garak
                        weight: 0.4
                        primary_score:
                          metric: attack_success_rate
                          lower_is_better: true
                        pass_criteria:
