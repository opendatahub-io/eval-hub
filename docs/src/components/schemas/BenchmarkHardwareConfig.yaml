type: object
title: BenchmarkHardwareConfig
description: >
  Optional per-benchmark hardware override for Kubernetes runtimes. When
  `hardware_profile_ref` is set, the server fetches the named OpenDataHub
  `HardwareProfile` custom resource and applies its CPU, memory, and GPU resource
  values to the evaluation Job adapter container. Values missing from the profile
  fall back to the provider `runtime.k8s` configuration (and built-in defaults
  when those are unset).
properties:
  hardware_profile_ref:
    $ref: ./HardwareProfileRef.yaml
