type: object
title: HardwareProfileRef
description: Reference to an OpenDataHub HardwareProfile custom resource.
required:
  - name
properties:
  name:
    type: string
    pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
    description: >
      Name of the `HardwareProfile` custom resource
      (`hardwareprofiles.infrastructure.opendatahub.io`). Must conform to
      RFC 1123 DNS label naming (lowercase letters, digits, and internal hyphens).
    examples:
      - default-profile
      - gpu-profile-v1
  namespace:
    type: string
    pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
    description: >
      Namespace of the `HardwareProfile` custom resource. When omitted, the
      server defaults to the evaluation job tenant namespace (from the
      `X-Tenant` request header in cluster mode).
    examples:
      - my-tenant-namespace
