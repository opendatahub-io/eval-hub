type: object
description: Message from a downstream service
properties:
  message:
    type: string
    description: Human-readable message
  message_code:
    type: string
    description: Machine-readable code
  message_origin:
    type: string
    description: Origin of the message
    enum:
      - server
      - runtime
      - adapter
      - sdk
required:
  - message
  - message_code
