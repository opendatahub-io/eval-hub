get:
  tags:
    - Evaluations
  summary: Get Evaluation
  description: Returns the evaluation job resource with the current status and results.
  operationId: get_evaluations_jobs_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Id
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EvaluationJobResource.yaml
          examples:
            response:
              summary: Completed evaluation job with benchmark results
              value:
                resource:
                  id: "a1b2c3d4-5678-9abc-def0-1234567890ab"
                  tenant: "default"
                  created_at: "2026-01-15T09:30:00Z"
                  updated_at: "2026-01-15T09:42:15Z"
                  owner: "user@example.com"
                status:
                  state: "completed"
                  message:
                    message: "Evaluation job completed."
                    message_code: "evaluation_job_updated"
                  benchmarks:
                    - provider_id: "lm_evaluation_harness"
                      id: "arc_easy"
                      benchmark_index: 0
                      status: "completed"
                      started_at: "2026-01-15T09:31:00Z"
                      completed_at: "2026-01-15T09:38:45Z"
                    - provider_id: "garak"
                      id: "owasp_llm_top10"
                      benchmark_index: 1
                      status: "completed"
                      started_at: "2026-01-15T09:31:00Z"
                      completed_at: "2026-01-15T09:42:15Z"
                results:
                  benchmarks:
                    - id: "arc_easy"
                      provider_id: "lm_evaluation_harness"
                      benchmark_index: 0
                      metrics:
                        acc: 0.82
                        acc_norm: 0.85
                      mlflow_run_id: "run-7f3a1b2c"
                      logs_path: "/data/logs/a1b2c3d4.log"
                      test:
                        primary_score: 0.85
                        threshold: 0.25
                        pass: true
                    - id: "owasp_llm_top10"
                      provider_id: "garak"
                      benchmark_index: 1
                      metrics:
                        attack_success_rate: 0.12
                      mlflow_run_id: "run-9e8d7c6b"
                      logs_path: "/data/logs/a1b2c3d4-garak.log"
                      test:
                        primary_score: 0.12
                        threshold: 0.3
                        pass: true
                  test:
                    score: 0.85
                    threshold: 0.5
                    pass: true
                name: "granite-3.1-8b-safety-eval"
                description: "Safety and reasoning evaluation for Granite 3.1 8B Instruct"
                tags:
                  - nightly
                  - granite
                model:
                  url: "http://llm-service.models.svc.cluster.local:8000/v1"
                  name: "granite-3.1-8b-instruct"
                benchmarks:
                  - id: "arc_easy"
                    provider_id: "lm_evaluation_harness"
                    weight: 0.6
                    primary_score:
                      metric: "acc_norm"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.25
                    parameters:
                      num_fewshot: 0
                      limit: 100
                  - id: "owasp_llm_top10"
                    provider_id: "garak"
                    weight: 0.4
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
                pass_criteria:
                  threshold: 0.5
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
delete:
  tags:
    - Evaluations
  summary: Cancel Evaluation
  description: Cancel a running evaluation.
  operationId: delete_evaluations_jobs_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Id
    - name: hard_delete
      in: query
      required: false
      schema:
        type: boolean
        description: >-
          If `true`, delete the evaluation job permanently so that `GET
          /api/v1/evaluations/jobs/{id}` will return a 404.
        default: false
        title: Hard Delete
  responses:
    '204':
      description: Successful Response
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
