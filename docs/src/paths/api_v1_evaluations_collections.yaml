get:
  tags:
    - Collections
  summary: List Collections
  description: List all benchmark collections.
  operationId: get_collections
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        maximum: 100
        minimum: 1
        description: Maximum number of collections to return
        default: 50
        title: Limit
      description: Maximum number of collections to return
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        description: Offset for pagination
        default: 0
        title: Offset
      description: Offset for pagination
    - name: name
      in: query
      required: false
      schema:
        type: string
        title: Name
      description: Name to search for
    - name: category
      in: query
      required: false
      schema:
        type: string
        title: Category
      description: Category to search for
    - name: tags
      in: query
      required: false
      schema:
        type: string
        title: Tags
      description: Tags to search for
    - name: scope
      in: query
      required: false
      schema:
        type: string
        enum:
          - system
          - tenant
        title: Scope of collections
      description: >
        Set to `system` to get only system defined collections, or `tenant` to get only user defined collections.
        If `scope` is not provided, both system and user defined collections will be returned.
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResourceList.yaml
          examples:
            response:
              summary: Paginated list of benchmark collections
              value:
                first:
                  href: "/api/v1/evaluations/collections?limit=50&offset=0"
                limit: 50
                total_count: 2
                items:
                  - resource:
                      id: "e5f6a7b8-9012-3456-cdef-0123456789ab"
                      tenant: "default"
                      created_at: "2025-12-01T10:00:00Z"
                      updated_at: "2025-12-01T10:00:00Z"
                    name: "llm-safety-suite"
                    category: "safety"
                    description: "Comprehensive safety evaluation combining reasoning accuracy and vulnerability scanning"
                    tags:
                      - safety
                      - nightly
                    pass_criteria:
                      threshold: 0.5
                    benchmarks:
                      - id: "arc_easy"
                        provider_id: "lm_evaluation_harness"
                        weight: 0.6
                        primary_score:
                          metric: "acc_norm"
                          lower_is_better: false
                        pass_criteria:
                          threshold: 0.25
                      - id: "owasp_llm_top10"
                        provider_id: "garak"
                        weight: 0.4
                        primary_score:
                          metric: "attack_success_rate"
                          lower_is_better: true
                        pass_criteria:
                          threshold: 0.3
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
post:
  tags:
    - Collections
  summary: Create Collection
  description: Create a new collection.
  operationId: post_collections
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CollectionConfig.yaml
        examples:
          request:
            summary: Create a safety evaluation collection
            value:
              name: "release-gate-safety"
              category: "safety"
              description: "Release-gate collection combining reasoning and red-teaming benchmarks"
              tags:
                - release-gate
                - safety
              pass_criteria:
                threshold: 0.5
              benchmarks:
                - id: "arc_easy"
                  provider_id: "lm_evaluation_harness"
                  weight: 0.6
                  primary_score:
                    metric: "acc_norm"
                    lower_is_better: false
                  pass_criteria:
                    threshold: 0.25
                  parameters:
                    num_fewshot: 0
                    limit: 100
                - id: "owasp_llm_top10"
                  provider_id: "garak"
                  weight: 0.4
                  primary_score:
                    metric: "attack_success_rate"
                    lower_is_better: true
                  pass_criteria:
                    threshold: 0.3
          MinimalCollection:
            summary: Create a minimal collection
            value:
              name: "quick-reasoning-check"
              category: "reasoning"
              benchmarks:
                - id: "arc_easy"
                  provider_id: "lm_evaluation_harness"
          MultiBenchmarkCollection:
            summary: Create a multi-benchmark collection with per-benchmark thresholds
            value:
              name: "comprehensive-safety-gate"
              category: "safety"
              description: "Comprehensive safety gate combining multiple Garak scans"
              tags:
                - safety
                - release-gate
              pass_criteria:
                threshold: 0.5
              benchmarks:
                - id: "owasp_llm_top10"
                  provider_id: "garak"
                  weight: 0.4
                  primary_score:
                    metric: "attack_success_rate"
                    lower_is_better: true
                  pass_criteria:
                    threshold: 0.3
                - id: "quality"
                  provider_id: "garak"
                  weight: 0.3
                  primary_score:
                    metric: "attack_success_rate"
                    lower_is_better: true
                  pass_criteria:
                    threshold: 0.3
                - id: "intents"
                  provider_id: "garak"
                  weight: 0.3
                  primary_score:
                    metric: "attack_success_rate"
                    lower_is_better: true
                  pass_criteria:
                    threshold: 0.3
    required: true
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CollectionResource.yaml
          examples:
            response:
              summary: Newly created collection
              value:
                resource:
                  id: "f6a7b8c9-0123-4567-def0-123456789abc"
                  tenant: "default"
                  created_at: "2026-02-01T09:00:00Z"
                  updated_at: "2026-02-01T09:00:00Z"
                  owner: "user@example.com"
                name: "release-gate-safety"
                category: "safety"
                description: "Release-gate collection combining reasoning and red-teaming benchmarks"
                tags:
                  - release-gate
                  - safety
                pass_criteria:
                  threshold: 0.5
                benchmarks:
                  - id: "arc_easy"
                    provider_id: "lm_evaluation_harness"
                    weight: 0.6
                    primary_score:
                      metric: "acc_norm"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.25
                    parameters:
                      num_fewshot: 0
                      limit: 100
                  - id: "owasp_llm_top10"
                    provider_id: "garak"
                    weight: 0.4
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
