get:
  summary: Health Check
  description: Health check endpoint.
  operationId: get_health
  tags:
    - Health
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HealthResponse.yaml
          examples:
            healthy:
              summary: Healthy service response
              value:
                status: healthy
                version: '0.4.1'
                timestamp: '2026-05-27T18:42:11Z'
                components:
                  database:
                    status: healthy
                    latency_ms: 2
                  mlflow:
                    status: healthy
                    latency_ms: 15
                uptime: 86400000000000
                active_evaluations: 5
            degraded:
              summary: Degraded service response
              value:
                status: degraded
                version: '0.4.1'
                timestamp: '2026-05-27T18:42:11Z'
                components:
                  database:
                    status: healthy
                    latency_ms: 3
                  mlflow:
                    status: degraded
                    latency_ms: 4500
                    error: 'connection timeout after 4000ms'
                uptime: 172800000000000
                active_evaluations: 12
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
