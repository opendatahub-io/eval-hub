get:
  tags:
    - Providers
  summary: Get Provider
  description: Get a provider by ID.
  operationId: get_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        description: Provider ID
        title: Provider Id
      description: Provider ID
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Garak vulnerability scanning provider
              value:
                resource:
                  id: "d8e9f0a1-2345-6789-cdef-012345678901"
                  tenant: "default"
                  created_at: "2025-10-01T00:00:00Z"
                  updated_at: "2025-10-01T00:00:00Z"
                name: "garak"
                title: "Garak"
                description: "LLM vulnerability scanner and red-teaming framework"
                tags:
                  - security
                  - red_team
                runtime:
                  k8s:
                    image: "quay.io/trustyai/trustyai-garak-lls-provider-dsp:latest"
                    entrypoint:
                      - "python"
                      - "-m"
                      - "llama_stack_provider_trustyai_garak.evalhub"
                    cpu_request: "500m"
                    memory_request: "512Mi"
                    cpu_limit: "2000m"
                    memory_limit: "4Gi"
                benchmarks:
                  - id: "owasp_llm_top10"
                    name: "OWASP LLM top 10 risk scan"
                    description: "Tests against the top 10 security risks specific to LLM applications."
                    category: "security"
                    metrics:
                      - attack_success_rate
                    tags:
                      - security
                      - owasp
                      - red_team
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
                  - id: "quality"
                    name: "Toxic & harmful content scan"
                    description: "Scans for violence, profanity, toxicity, hate speech, and integrity issues."
                    category: "safety"
                    metrics:
                      - attack_success_rate
                    tags:
                      - safety
                      - quality
                      - toxicity
                      - red_team
                    primary_score:
                      metric: "attack_success_rate"
                      lower_is_better: true
                    pass_criteria:
                      threshold: 0.3
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
    - Providers
  summary: Update Provider
  description: Update an existing provider.
  operationId: put_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        description: Provider ID
        title: Provider Id
      description: Provider ID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ProviderConfig.yaml
        examples:
          request:
            summary: Update a custom provider with a new image version
            value:
              name: "my-custom-evaluator"
              title: "Custom Internal Evaluator"
              description: "Updated evaluation adapter with improved tokenization"
              tags:
                - custom
                - internal
              runtime:
                k8s:
                  image: "registry.internal.example.com/eval/custom-adapter:v2.0"
                  entrypoint:
                    - "/opt/app-root/bin/python"
                    - "/opt/app-root/src/main.py"
                  cpu_request: "500m"
                  memory_request: "1Gi"
                  cpu_limit: "2"
                  memory_limit: "4Gi"
              benchmarks:
                - id: "domain-qa"
                  name: "Domain Q&A Accuracy"
                  description: "Measures accuracy on domain-specific question answering"
                  category: "reasoning"
                  metrics:
                    - acc
                    - f1
                  primary_score:
                    metric: "acc"
                    lower_is_better: false
                  pass_criteria:
                    threshold: 0.5
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Updated provider resource
              value:
                resource:
                  id: "c4d5e6f7-8901-2345-bcde-f67890123456"
                  tenant: "default"
                  created_at: "2026-01-20T10:00:00Z"
                  updated_at: "2026-02-05T14:30:00Z"
                name: "my-custom-evaluator"
                title: "Custom Internal Evaluator"
                description: "Updated evaluation adapter with improved tokenization"
                tags:
                  - custom
                  - internal
                runtime:
                  k8s:
                    image: "registry.internal.example.com/eval/custom-adapter:v2.0"
                    entrypoint:
                      - "/opt/app-root/bin/python"
                      - "/opt/app-root/src/main.py"
                    cpu_request: "500m"
                    memory_request: "1Gi"
                    cpu_limit: "2"
                    memory_limit: "4Gi"
                benchmarks:
                  - id: "domain-qa"
                    name: "Domain Q&A Accuracy"
                    description: "Measures accuracy on domain-specific question answering"
                    category: "reasoning"
                    metrics:
                      - acc
                      - f1
                    primary_score:
                      metric: "acc"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.5
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
patch:
  tags:
    - Providers
  summary: Patch Provider
  description: Partially update an existing provider.
  operationId: patch_providers_id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        title: Provider Id
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          title: Json Patch
          description: JSON Patch operation
          items:
            $ref: ../components/schemas/PatchOperation.yaml
        examples:
          request:
            summary: Update the container image version
            value:
              - op: "replace"
                path: "/runtime/k8s/image"
                value: "registry.internal.example.com/eval/custom-adapter:v2.1"
              - op: "replace"
                path: "/description"
                value: "Updated evaluation adapter with bug fixes"
          AddTags:
            summary: Add tags to a provider
            value:
              - op: "add"
                path: "/tags"
                value:
                  - gpu
                  - production
          UpdateRuntime:
            summary: Replace the local runtime command
            value:
              - op: "replace"
                path: "/runtime/local/command"
                value: "python /opt/eval/run_benchmark_v2.py"
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProviderResource.yaml
          examples:
            response:
              summary: Provider after applying patch operations
              value:
                resource:
                  id: "c4d5e6f7-8901-2345-bcde-f67890123456"
                  tenant: "default"
                  created_at: "2026-01-20T10:00:00Z"
                  updated_at: "2026-02-06T09:15:00Z"
                name: "my-custom-evaluator"
                title: "Custom Internal Evaluator"
                description: "Updated evaluation adapter with bug fixes"
                tags:
                  - custom
                  - internal
                runtime:
                  k8s:
                    image: "registry.internal.example.com/eval/custom-adapter:v2.1"
                    entrypoint:
                      - "/opt/app-root/bin/python"
                      - "/opt/app-root/src/main.py"
                    cpu_request: "500m"
                    memory_request: "1Gi"
                    cpu_limit: "2"
                    memory_limit: "4Gi"
                benchmarks:
                  - id: "domain-qa"
                    name: "Domain Q&A Accuracy"
                    description: "Measures accuracy on domain-specific question answering"
                    category: "reasoning"
                    metrics:
                      - acc
                      - f1
                    primary_score:
                      metric: "acc"
                      lower_is_better: false
                    pass_criteria:
                      threshold: 0.5
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml

